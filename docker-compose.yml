x-gpu-resources: &gpu-resources
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

services:
  orchestrator:
    build:
      context: ./orchestrator
    container_name: ai_dubbing_orchestrator
    command: uvicorn orchestrator.api:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./orchestrator:/app/orchestrator
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - WHISPERX_API=http://whisperx:8000
      - DEMUCS_API=http://demucs:8000
      - TTS_API=http://tts:9880
      - OMNIVOICE_API=http://omnivoice:3900
      - LIPSYNC_API=http://lipsync:8010
      - TTS_ENGINE=${TTS_ENGINE:-omnivoice}
      - LLM_BACKEND=${LLM_BACKEND:-ollama}
      - LLM_MODEL=${LLM_MODEL:-qwen2.5:14b}
      - VRAM_PROFILE=${VRAM_PROFILE:-16gb}
      - ENABLE_LIPSYNC=${ENABLE_LIPSYNC:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      ollama:
        condition: service_healthy
      whisperx:
        condition: service_healthy
      demucs:
        condition: service_started
    <<: *gpu-resources
    restart: on-failure:3

  frontend:
    build:
      context: ./frontend
    container_name: ai_dubbing_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - orchestrator
    restart: always

  ollama:
    image: ollama/ollama:latest
    container_name: ai_dubbing_ollama
    ports:
      - "11434:11434"
    volumes:
      - ./models/ollama:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    <<: *gpu-resources

  whisperx:
    build:
      context: ./whisperx-service
    image: ai_dubbing_whisperx:local
    container_name: ai_dubbing_whisperx
    ports:
      - "8001:8000"
    volumes:
      - ./models/whisper:/root/.cache
      - ./data/temp:/app/temp
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3}
      - WHISPER_LANGUAGE=${WHISPER_LANGUAGE:-}
      - HF_TOKEN=${HF_TOKEN:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    <<: *gpu-resources

  demucs:
    image: xserrat/facebook-demucs:latest
    container_name: ai_dubbing_demucs
    volumes:
      - ./data/temp:/data
      - ./models/demucs:/root/.cache/torch/hub
    entrypoint: ["tail", "-f", "/dev/null"]
    <<: *gpu-resources

  # GPT-SoVITS adapter — only needed when TTS_ENGINE=gpt_sovits (default is omnivoice).
  # Built locally from the official repo; see tts-service/README.md.
  tts:
    build:
      context: ./tts-service
    image: ai_dubbing_tts:local
    container_name: ai_dubbing_tts
    ports:
      - "9880:9880"
    volumes:
      - ./models/tts:/app/GPT-SoVITS/GPT_SoVITS/pretrained_models
      - ./data/temp:/app/temp
    environment:
      - GPT_SOVITS_PROMPT_TEXT=${GPT_SOVITS_PROMPT_TEXT:-}
      - GPT_SOVITS_PROMPT_LANG=${GPT_SOVITS_PROMPT_LANG:-auto}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9880/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    profiles:
      - gpt_sovits
    <<: *gpu-resources

  omnivoice:
    image: ghcr.io/debpalash/omnivoice-studio:latest
    container_name: ai_dubbing_omnivoice
    ports:
      - "3900:3900"
    volumes:
      - ./models/omnivoice:/root/.local/share/omnivoice
      - ./data/temp:/app/temp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3900/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    <<: *gpu-resources

  # M9 Lip-sync: LatentSync
  # Image needs to be built from: https://github.com/bytedance/LatentSync
  # Build: docker build -t lipsync-api:latest ./lipsync-service/
  lipsync:
    image: lipsync-api:latest
    container_name: ai_dubbing_lipsync
    ports:
      - "8010:8010"
    volumes:
      - ./models/lipsync:/app/models
      - ./data/temp:/app/temp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    profiles:
      - lipsync
    <<: *gpu-resources
