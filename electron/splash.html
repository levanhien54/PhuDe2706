<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Dubbing</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      border-radius: 16px;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
    }

    .logo {
      font-size: 56px;
      margin-bottom: 16px;
      filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.6));
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.08); }
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #a5b4fc 0%, #818cf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }

    .tagline {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 36px;
      letter-spacing: 0.5px;
    }

    .progress-track {
      width: 240px;
      height: 4px;
      background: #1e293b;
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .progress-bar {
      height: 100%;
      width: 30%;
      background: linear-gradient(90deg, #6366f1, #a78bfa);
      border-radius: 99px;
      animation: slide 1.8s ease-in-out infinite;
    }

    @keyframes slide {
      0%   { transform: translateX(-100%); }
      50%  { transform: translateX(250%); }
      100% { transform: translateX(250%); }
    }

    .status {
      font-size: 12px;
      color: #475569;
      min-height: 18px;
      transition: opacity 0.3s;
    }

    .dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
    }

    .version {
      position: absolute;
      bottom: 16px;
      font-size: 10px;
      color: #334155;
    }

    #svc-list {
      list-style: none;
      width: 240px;
      margin: 4px 0 14px;
      font-size: 12px;
      color: #cbd5e1;
      -webkit-app-region: no-drag;
    }

    #svc-list li {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 3px 0;
    }

    #logs-btn {
      -webkit-app-region: no-drag;
      background: #1e293b;
      color: #a5b4fc;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 12px;
      cursor: pointer;
      margin-bottom: 10px;
    }

    #logs-btn:hover {
      background: #334155;
    }
  </style>
</head>
<body>
  <div class="logo">🎬</div>
  <h1>Video Dubbing</h1>
  <p class="tagline">AI-Powered Video Dubbing System</p>
  <div class="progress-track">
    <div class="progress-bar"></div>
  </div>
  <p class="status" id="status">Đang khởi động dịch vụ<span class="dots"></span></p>
  <ul id="svc-list"></ul>
  <button id="logs-btn" style="display:none" onclick="window.vd.openLogs()">Mở thư mục log</button>
  <p class="version">v1.0.0</p>

  <script>
    const messages = [
      'Khởi động Orchestrator',
      'Tải WhisperX (nhận diện giọng nói)',
      'Tải TTS Service (tổng hợp giọng nói)',
      'Kiểm tra kết nối GPU',
      'Chuẩn bị giao diện',
      'Sắp xong rồi',
    ];
    let idx = 0;
    const el = document.getElementById('status');
    function next() {
      el.textContent = messages[idx % messages.length];
      const dots = document.createElement('span');
      dots.className = 'dots';
      el.appendChild(dots);
      idx++;
    }
    next();
    setInterval(next, 4000);
  </script>

  <script>
    const ROWS = [['gpu','GPU'],['ollama','Dịch (Ollama)'],['whisperx','Nhận giọng'],
                  ['omnivoice','Giọng đọc'],['orchestrator','Điều phối']];
    const icon = (s) => s === 'up' || s === 'ok' ? '✅' : s === 'down' || s === 'missing' ? '❌' : '⏳';
    let downTicks = 0;
    window.vd?.onServiceStatus((d) => {
      const st = Object.assign({ gpu: d.gpu }, d.services || {});
      document.getElementById('svc-list').innerHTML = ROWS.map(([k, label]) =>
        `<li>${icon(st[k] || 'connecting')} ${label}</li>`).join('');
      const anyDown = ROWS.some(([k]) => st[k] === 'down' || st[k] === 'missing');
      downTicks = anyDown ? downTicks + 1 : 0;
      document.getElementById('logs-btn').style.display = downTicks > 8 ? 'inline-block' : 'none';
    });
  </script>
</body>
</html>
